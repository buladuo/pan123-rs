name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz

          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz

          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare release assets (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BINARY_NAME="pan123"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_NAME="pan123.exe"
          fi

          VERSION="${{ needs.create-release.outputs.version }}"
          RELEASE_NAME="pan123-${VERSION}-${{ matrix.target }}"
          RELEASE_DIR="dist/${RELEASE_NAME}"

          mkdir -p "${RELEASE_DIR}"

          # 复制二进制文件
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${RELEASE_DIR}/"

          # 复制文档
          cp README.md "${RELEASE_DIR}/" || true
          cp LICENSE "${RELEASE_DIR}/" || true
          cp QUICKSTART.md "${RELEASE_DIR}/" || true

          # 创建安装脚本
          cat > "${RELEASE_DIR}/install.sh" << 'EOF'
          #!/bin/bash
          set -e
          BINARY_NAME="pan123"
          INSTALL_DIR="/usr/local/bin"
          echo "正在安装 ${BINARY_NAME}..."
          if [ ! -w "$INSTALL_DIR" ]; then
              echo "需要 sudo 权限来安装到 ${INSTALL_DIR}"
              sudo cp "${BINARY_NAME}" "${INSTALL_DIR}/${BINARY_NAME}"
              sudo chmod +x "${INSTALL_DIR}/${BINARY_NAME}"
          else
              cp "${BINARY_NAME}" "${INSTALL_DIR}/${BINARY_NAME}"
              chmod +x "${INSTALL_DIR}/${BINARY_NAME}"
          fi
          echo "✓ 安装完成！"
          echo "运行 '${BINARY_NAME} --help' 查看帮助信息"
          EOF

          chmod +x "${RELEASE_DIR}/install.sh"

          # 打包
          cd dist
          tar -czf "${RELEASE_NAME}.tar.gz" "${RELEASE_NAME}"
          cd ..

          echo "ASSET_PATH=dist/${RELEASE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=${RELEASE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Prepare release assets (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $Version = "${{ needs.create-release.outputs.version }}"
          $ReleaseName = "pan123-${Version}-${{ matrix.target }}"
          $ReleaseDir = "dist\${ReleaseName}"

          New-Item -ItemType Directory -Force -Path $ReleaseDir | Out-Null

          # 复制文件
          Copy-Item "target\${{ matrix.target }}\release\pan123.exe" "$ReleaseDir\"
          Copy-Item "README.md" "$ReleaseDir\" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "$ReleaseDir\" -ErrorAction SilentlyContinue
          Copy-Item "QUICKSTART.md" "$ReleaseDir\" -ErrorAction SilentlyContinue

          # 创建安装脚本
          $InstallScript = @'
          @echo off
          setlocal
          set BINARY_NAME=pan123.exe
          set INSTALL_DIR=%ProgramFiles%\pan123
          echo 正在安装 %BINARY_NAME%...
          if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"
          copy /Y "%BINARY_NAME%" "%INSTALL_DIR%\%BINARY_NAME%" >nul
          if errorlevel 1 (
              echo 错误: 需要管理员权限
              echo 请右键点击此脚本，选择"以管理员身份运行"
              pause
              exit /b 1
          )
          echo.
          echo ✓ 安装完成！
          echo 请将 %INSTALL_DIR% 添加到系统 PATH
          echo 然后运行: pan123 --help
          pause
          '@

          Set-Content -Path "$ReleaseDir\install.bat" -Value $InstallScript -Encoding ASCII

          # 打包
          Compress-Archive -Path $ReleaseDir -DestinationPath "dist\${ReleaseName}.zip" -Force

          echo "ASSET_PATH=dist\${ReleaseName}.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=${ReleaseName}.zip" >> $env:GITHUB_ENV

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ASSET_PATH }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/octet-stream

  checksums:
    name: Generate Checksums
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate checksums
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "# SHA256 Checksums" > checksums.txt
          echo "" >> checksums.txt
          find . -name "pan123-*.tar.gz" -o -name "pan123-*.zip" | while read file; do
            sha256sum "$file" >> checksums.txt
          done

      - name: Upload checksums
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain
